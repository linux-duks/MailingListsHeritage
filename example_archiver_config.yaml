# Example archiver configuration file
# 
# This configuration uses the nested format with source-specific blocks.
# Global settings (nthreads, output_dir, loop_groups) are at the top level.
# The `nntp:` block contains all NNTP-specific settings.
# The `public_inbox:` block contains settings for consumming public-inbox git repositories

nthreads: 3
output_dir: "./output/archiver"
loop_groups: true

# write_mode:
#   "parquet:10000"
#   or "raw_email"

# read_lists delcaration is optional.
# if empty, the user will be prompted with the options found
# in the source to select
read_lists:
  nntp: ["*"]
  public_inbox: ["*"]

nntp:
  hostname: "nntp://localhost"
  # email_range: "1-100"  # Optional: fetch specific range from first list

public_inbox:
  origin: public-inbox.example.org
  import_directory: /media/public-inbox-data

