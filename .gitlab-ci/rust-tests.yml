  artifacts:
    when: always
    paths:
      - mlh_parser/coverage-summary.md
    expire_in: 7 days
  after_script:
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ] && [ -f mlh_parser/coverage-summary.md ]; then
